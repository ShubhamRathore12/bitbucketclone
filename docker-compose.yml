version: '3.9'

services:
  postgres:
    image: postgres:17-alpine
    container_name: gitforge-db
    environment:
      POSTGRES_USER: gitforge
      POSTGRES_PASSWORD: gitforge_secret
      POSTGRES_DB: gitforge
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gitforge"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: gitforge-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gitforge-backend
    ports:
      - "8080:8080"
    environment:
      - SERVER_PORT=8080
      - SERVER_ENV=development
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=gitforge
      - DB_PASSWORD=gitforge_secret
      - DB_NAME=gitforge
      - DB_POOL_MAX=25
      - REDIS_ADDR=redis:6379
      - REDIS_PASSWORD=
      - REDIS_DB=0
      - JWT_SECRET=your-super-secret-jwt-key-change-in-production
      - JWT_ACCESS_TTL=15m
      - JWT_REFRESH_TTL=168h
      - GIT_BASE_PATH=/data/git-repos
      - AI_CLAUDE_API_KEY=${CLAUDE_API_KEY:-}
      - AI_MODEL=claude-sonnet-4-20250514
    volumes:
      - git_repos:/data/git-repos
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gitforge-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  git_repos:
